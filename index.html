<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWSWeb Tactical HUD</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #start-btn { padding: 20px 40px; border: 1px solid #f00; background: #000; color: #f00; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <button id="start-btn">[ INITIATE FWS_WEB ]</button>
    <div id="content" style="display:none; text-align:center;">
        <h1>SYSTEM ACTIVE</h1>
        <button id="exit-btn">[ EXIT ]</button>
    </div>

    <script>
        // Створюємо аудіо об'єкт. Жодних інших звукових функцій тут немає.
        const audio = new Audio('Objective_Scan.mp3');
        audio.loop = true;

        const startBtn = document.getElementById('start-btn');
        const exitBtn = document.getElementById('exit-btn');
        const content = document.getElementById('content');

        startBtn.addEventListener('click', () => {
            // Браузер дозволить грати звук ТІЛЬКИ після цього натискання
            audio.play().catch(e => console.error("Звук заблоковано браузером:", e));
            
            startBtn.style.display = 'none';
            content.style.display = 'block';
        });

        exitBtn.addEventListener('click', () => {
            audio.pause();
            audio.currentTime = 0;
            window.location.reload();
        });
    </script>
</body>
</html>
