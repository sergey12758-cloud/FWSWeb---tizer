<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FWSWeb Tactical HUD</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #camera-feed { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:none; filter: grayscale(100%) sepia(100%) hue-rotate(300deg) contrast(1.5); }
        .container { padding: 20px; z-index: 10; background: rgba(0,0,0,0.8); border: 1px solid #f00; margin: 20px; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; border: 1px solid #f00; background: #000; color: #f00; cursor: pointer; font-size: 1.5rem; }
        #optics-toggle, #exit-btn { position: absolute; padding: 10px; border: 1px solid #f00; background: #000; color: #f00; cursor: pointer; display: none; z-index: 20; }
        #optics-toggle { top: 10px; right: 10px; }
        #exit-btn { bottom: 10px; left: 10px; }
    </style>
</head>
<body>

    <button id="start-btn">[ INITIATE FWS_WEB ]</button>
    <button id="optics-toggle">[ OPTICS : OFF ]</button>
    <button id="exit-btn">[ EXIT ]</button>

    <video id="camera-feed" autoplay playsinline muted></video>

    <div class="container" id="content" style="display:none;">
        <h1 id="title"></h1>
        <p id="desc"></p>
    </div>

    <script>
        // ДАНІ ПРЕЗЕНТАЦІЇ
        const slides = [
            { title: "FWSWEB PROJECT", desc: "Геоінформаційна система управління ППВ." },
            { title: "CORE ARCHITECTURE", desc: "Laravel Backend / FastAPI AI / PostGIS." },
            { title: "AI WATCHDOG", desc: "Автоматичне виявлення аномалій у БД." },
            { title: "TACTICAL AR", desc: "AR-інтерфейс пошуку об'єктів у реальному часі." }
        ];

        // ПЛЕЄР (Шлях до файлу має бути точним)
        const music = new Audio('Objective_Scan.mp3');
        music.loop = true;

        let currentSlide = 0;
        const startBtn = document.getElementById('start-btn');
        const content = document.getElementById('content');
        const opticsBtn = document.getElementById('optics-toggle');
        const exitBtn = document.getElementById('exit-btn');
        const video = document.getElementById('camera-feed');

        // Функція друку тексту
        function showSlide() {
            document.getElementById('title').innerText = slides[currentSlide].title;
            document.getElementById('desc').innerText = slides[currentSlide].desc;
            currentSlide = (currentSlide + 1) % slides.length;
            setTimeout(showSlide, 4000);
        }

        startBtn.addEventListener('click', () => {
            // Запуск музики (тільки після кліку!)
            music.play().catch(e => console.error("Помилка звуку:", e));
            
            startBtn.style.display = 'none';
            content.style.display = 'block';
            opticsBtn.style.display = 'block';
            exitBtn.style.display = 'block';
            showSlide();
        });

        opticsBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                opticsBtn.innerText = "[ OPTICS : ON ]";
            } catch(e) { alert("Камера недоступна"); }
        });

        exitBtn.addEventListener('click', () => window.location.reload());
    </script>
</body>
</html>
