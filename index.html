<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FWSWeb Tactical HUD</title>
    <style>
        body { background-color: #000; color: #ff0000; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; text-shadow: 0 0 5px #ff0000; }
        #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: grayscale(100%) sepia(100%) hue-rotate(300deg) saturate(1000%) brightness(0.5) contrast(1.5); display: none; }
        .noise-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E'); opacity: 0.2; z-index: 2; pointer-events: none; mix-blend-mode: multiply; }
        .scanline { width: 100%; height: 4px; background-color: rgba(255, 0, 0, 0.8); position: absolute; top: 0; left: 0; box-shadow: 0 0 15px rgba(255, 0, 0, 1); animation: scan 4s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        #optics-toggle { position: absolute; top: 20px; right: 20px; padding: 10px 15px; border: 1px solid #ff0000; background: rgba(0, 0, 0, 0.7); color: #ff0000; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2rem; cursor: pointer; z-index: 50; display: none; box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); text-transform: uppercase; min-width: 240px; text-align: left; }
        #exit-btn { position: absolute; bottom: 20px; left: 20px; padding: 5px 10px; border: 1px solid #ff0000; background: rgba(0, 0, 0, 0.7); color: #ff0000; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 0.9rem; cursor: pointer; z-index: 50; display: none; box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); text-transform: uppercase; }
        .container { padding: 25px; z-index: 20; position: relative; background: rgba(0, 0, 0, 0.8); border: 2px solid rgba(255, 0, 0, 0.5); margin: 20px; min-height: 180px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        h1 { font-size: 2.2rem; border-bottom: 2px solid #ff0000; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: 1.4rem; line-height: 1.5; font-weight: bold; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; background-color: rgba(0, 0, 0, 0.9); color: #ff0000; border: 2px solid #ff0000; cursor: pointer; z-index: 100; font-family: 'Courier New', Courier, monospace; font-weight: bold; text-align: center; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
    </style>
</head>
<body>
    <button id="start-btn">[ INITIATE FWS_WEB ]</button>
    <button id="exit-btn">[ EXIT ]</button>
    <button id="optics-toggle"></button>
    <video id="camera-feed" autoplay playsinline muted></video>
    <div class="noise-overlay"></div>
    <div class="scanline"></div>
    <div class="container" id="content" style="display: none;">
        <h1 id="title"></h1>
        <p id="desc"></p>
    </div>

    <script>
        // ПІДКЛЮЧАЄМО ВАШ ФАЙЛ
        const tacticalMusic = new Audio('Objective_Scan.mp3');
        tacticalMusic.loop = true;
        
        const startBtn = document.getElementById('start-btn');
        const contentDiv = document.getElementById('content');
        const opticsBtn = document.getElementById('optics-toggle');
        const exitBtn = document.getElementById('exit-btn');

        startBtn.addEventListener('click', () => {
            // Запуск музики
            tacticalMusic.play().catch(e => console.log("Music play blocked:", e));
            
            startBtn.style.display = 'none';
            contentDiv.style.display = 'block';
            opticsBtn.style.display = 'block';
            exitBtn.style.display = 'block';
        });

        exitBtn.addEventListener('click', () => {
            tacticalMusic.pause();
            tacticalMusic.currentTime = 0;
            window.location.reload();
        });
    </script>
</body>
</html>
