<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FWSWeb Tactical HUD</title>
    <style>
        body { background-color: #000; color: #ff0000; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; height: 100vh; text-shadow: 0 0 5px #ff0000; }
        
        /* СТИЛЬ КОРЕТКИ (КУРСОРА) */
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background-color: #ff0000; animation: blink 1s infinite; vertical-align: middle; margin-left: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: grayscale(100%) sepia(100%) hue-rotate(300deg) saturate(1000%) brightness(0.5) contrast(1.5); display: none; }
        .noise-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E'); opacity: 0.2; z-index: 2; pointer-events: none; mix-blend-mode: multiply; }
        .scanline { width: 100%; height: 4px; background-color: rgba(255, 0, 0, 0.8); position: absolute; top: 0; left: 0; box-shadow: 0 0 15px rgba(255, 0, 0, 1); animation: scan 4s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        #optics-toggle { position: absolute; top: 20px; right: 20px; padding: 10px 15px; border: 2px solid #ff0000; background: rgba(0, 0, 0, 0.7); color: #ff0000; font-weight: bold; cursor: pointer; z-index: 50; display: none; text-transform: uppercase; transition: all 0.3s ease; }
        #exit-btn { position: absolute; bottom: 20px; left: 20px; padding: 5px 10px; border: 1px solid #ff0000; background: rgba(0, 0, 0, 0.7); color: #ff0000; font-weight: bold; cursor: pointer; z-index: 50; display: none; text-transform: uppercase; }
        
        .container { padding: 25px; z-index: 20; position: relative; background: rgba(0, 0, 0, 0.8); border: 2px solid rgba(255, 0, 0, 0.5); margin: 20px; min-height: 150px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        #title { border-bottom: 2px solid #ff0000; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; font-size: 1.8rem; }
        #desc { font-size: 1.2rem; font-weight: bold; line-height: 1.4; }
        
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; border: 2px solid #ff0000; background: #000; color: #ff0000; cursor: pointer; z-index: 100; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <button id="start-btn">[ INITIATE FWS_WEB ]</button>
    <button id="exit-btn">[ EXIT ]</button>
    <button id="optics-toggle">[ OPTICS : OFF ]</button>

    <video id="camera-feed" autoplay playsinline muted></video>
    <div class="noise-overlay"></div>
    <div class="scanline"></div>
    
    <div class="container" id="content" style="display: none;">
        <h1 id="title"></h1>
        <p id="desc"><span id="text-output"></span><span class="cursor"></span></p>
    </div>

    <script>
        const slides = [
            { title: "FWSWEB PROJECT", desc: "Геоінформаційна система для управління пожежним водопостачанням." },
            { title: "ПРОБЛЕМАТИКА", desc: "Застарілі паперові карти, неактуальний стан гідрантів, низька швидкість реакції." },
            { title: "ЦІЛЬОВА ПЛАТФОРМА", desc: "Високоточне картографування, інтеграція з GPS, доступність в режимі офлайн." },
            { title: "ТЕХНОЛОГІЧНИЙ СТЕК", desc: "Laravel Backend, PostgreSQL/PostGIS, Leaflet.js." },
            { title: "AI WATCHDOG", desc: "Автономна система виявлення аномалій та перевірка цілісності даних." },
            { title: "KARMA ENGINE", desc: "Система довіри: вага правок базується на репутації користувача." },
            { title: "TACTICAL AR", desc: "Візуалізація гідрантів через камеру смартфона у реальному часі." },
            { title: "ROADMAP", desc: "IoT-датчики тиску, LiDAR-сканування та національна масштабованість." }
        ];

        const audio = new Audio('Objective_Scan.mp3');
        audio.loop = true;

        let currentSlide = 0;
        let isOpticsOn = false;
        let cameraStream = null;

        const startBtn = document.getElementById('start-btn');
        const contentDiv = document.getElementById('content');
        const opticsBtn = document.getElementById('optics-toggle');
        const exitBtn = document.getElementById('exit-btn');
        const video = document.getElementById('camera-feed');
        const titleEl = document.getElementById('title');
        const textOutput = document.getElementById('text-output');

        function typeWriter(text, el, speed, callback) {
            el.innerHTML = '';
            let i = 0;
            function type() {
                if (i < text.length) { 
                    el.innerHTML += text.charAt(i); 
                    i++; 
                    setTimeout(type, speed); 
                } else if(callback) {
                    callback();
                }
            }
            type();
        }

        function playSlide() {
            if (currentSlide >= slides.length) currentSlide = 0;
            
            // Спочатку пишемо заголовок
            titleEl.innerText = slides[currentSlide].title;
            // Потім друкуємо опис
            typeWriter(slides[currentSlide].desc, textOutput, 30, () => {
                currentSlide++;
                setTimeout(playSlide, 3000);
            });
        }

        startBtn.addEventListener('click', () => {
            audio.play().catch(e => console.error("Звук заблоковано:", e));
            startBtn.style.display = 'none';
            contentDiv.style.display = 'block';
            opticsBtn.style.display = 'block';
            exitBtn.style.display = 'block';
            playSlide();
        });

        opticsBtn.addEventListener('click', async () => {
            if (!isOpticsOn) {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = cameraStream;
                    video.style.display = 'block';
                    opticsBtn.innerText = "[ OPTICS : ON ]";
                    opticsBtn.style.borderColor = "#00ff00";
                    opticsBtn.style.color = "#00ff00";
                    isOpticsOn = true;
                } catch(e) { alert("Камера недоступна"); }
            } else {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    video.style.display = 'none';
                    opticsBtn.innerText = "[ OPTICS : OFF ]";
                    opticsBtn.style.borderColor = "#ff0000";
                    opticsBtn.style.color = "#ff0000";
                    isOpticsOn = false;
                }
            }
        });

        exitBtn.addEventListener('click', () => window.location.reload());
    </script>
</body>
</html>
